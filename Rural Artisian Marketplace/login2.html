<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="login2.css">
<script src="login2.js" defer></script>

</head>

<body>

<div class="layout">

    <!-- LEFT SIDE -->
    <div class="form-side">

        <div id="form-content">

            <h1 class="brand">RuralConnect</h1>
            <h2 class="main-title">Login as Seller</h2>

            <input type="tel" id="phoneNo" placeholder="10-digit phone number">
            <input type="password" id="password" placeholder="Enter password">

            <button class="btn" id="loginBtn">Login</button>

            <p id="errorMsg"></p>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="visual-side">

        <div class="curve"></div>

        <img src="./images/loginpageImage.avif"
        class="visual-img"
        alt="artisan">

    </div>

</div>

</body>
</html>
