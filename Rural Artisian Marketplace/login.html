<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
</head>
<body>
  <div class="layout">

    <div class="form-side">
      <div id="form-content">
        <h1 class="brand">RuralConnect</h1>
        <h2 class="main-title">Login As Buyer</h2>

        <input type="tel" id="phoneNo" placeholder="10-digit phone number" required>
        <button class="btn" id="sendOtp">Send OTP</button>
      </div>
    </div>

    <div class="visual-side">
      <div class="curve"></div>

      <img src="./images/loginpageImage.avif"
           alt="Seller working"
           class="visual-img">
    </div>

  </div>
</body>

</html>
