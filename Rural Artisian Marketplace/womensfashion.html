
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuralConnect - Premium Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     <script src="script.js" defer></script>
</head>
<body>
    <!-- Header -->
    <header class="rumarket-header">
        <div class="rumarket-container">
            <!-- Logo + Brand Name -->
            <div class="rumarket-brand">
                <img src="./images/rounded-handmade-vintage-label-by-Vexels.png" alt="Marketplace Logo" class="rumarket-logo">
                <span class="rumarket-name">
                    Rural<span class="rumarket-name-accent">Connect</span>
                </span>
            </div>
        
            <!-- Search Bar -->
            <div class="rumarket-search">
                <input type="text" placeholder="Search products..." />
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        
            <!-- Login & Cart -->
            <div class="rumarket-actions">
                <div class="logos">
                    <div class="logoandname">
                        <a href="login.html" class="rumarket-icon" title="Login">
                            <i class="fa-solid fa-user"></i>
                        </a>
                        <div class="detail">Log in</div>
                    </div>
                    <div class="logoandname" onclick="toggleCart()" style="cursor:pointer;">
                    <a href="#" class="rumarket-icon" title="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
                    <div class="detail">Cart (<span id="cartCount">0</span>)</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout with Sidebar -->
    <div class="main-layout">
        <!-- Left Sidebar - Categories -->
        <aside class="category-container">
            <h3>Categories</h3>
            <button class="category-btn" onclick="location.href='index.html'">All Products</button>
            <button class="category-btn" onclick="location.href='pottery.html'">Pottery</button>
            <button class="category-btn" onclick="location.href='Handloom.html'">Handloom</button>
            <button class="category-btn" onclick="location.href='wooden.html'">Wooden</button>
            <button class="category-btn" onclick="location.href='jewelry.html'">Jewelry</button>
            <button class="category-btn" onclick="location.href='metalcraft.html'">Metalcraft</button>
            <button class="category-btn" onclick="location.href='bamboo.html'">Bamboo</button>
            <button class="category-btn" onclick="location.href='carpets.html'">Carpets</button>
            <button class="category-btn" onclick="location.href='Painting.html'">Painting</button>
            <button class="category-btn" onclick="location.href='leather.html'">Leather</button>
            <button class="category-btn active" onclick="location.href='womensfashion.html'">Women's Fashion</button>
            <button class="category-btn" onclick="location.href='mensfashion.html'">Men's Fashion</button>
        </aside>

        <!-- Content Area - Products -->
        <div class="content-area">
            <div class="product-grid" id="productGrid">
                <!-- Product cards will be added here -->
               <div class="p-card">
            <img src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcTGroZXvDcpEes-Tlk3mW9mqmFb0ojGcC2gUITkwK9vzerLZaQuw7fnkXIFTbFv" alt="Phulkari Dupatta">
            <h4>Phulkari Silk Dupatta</h4>
            <p class="price">₹1,450</p>
            <button class="buy-btn" onclick="openProduct(1001, 'Phulkari Silk Dupatta', 1450, 'Traditional hand-embroidered floral dupatta from Punjab on premium silk fabric.', 'https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcTGroZXvDcpEes-Tlk3mW9mqmFb0ojGcC2gUITkwK9vzerLZaQuw7fnkXIFTbFv')">Buy Now</button>
        </div>

        <div class="p-card">
            <img src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcSfv9mDNtM_QCoTD21Vv9VIgRyW_JYO9Vm4glEMFXUKbsd2cyidMYAwiRvJ_fHv" alt="Chikankari Kurti">
            <h4>Lucknawi Chikan Kurti</h4>
            <p class="price">₹1,200</p>
            <button class="buy-btn" onclick="openProduct(1002, 'Lucknawi Chikan Kurti', 1200, 'Hand-stitched shadow work embroidery on breathable fine cotton cloth.', 'https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcSfv9mDNtM_QCoTD21Vv9VIgRyW_JYO9Vm4glEMFXUKbsd2cyidMYAwiRvJ_fHv')">Buy Now</button>
        </div>

        <div class="p-card">
            <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQiii67uZ4CZQoZzFhgezIbvDKVpVnTgnzcMp43r5gfe_ZXgwkkTBqvnCFXnC_I" alt="Banarasi Saree">
            <h4>Banarasi Silk Saree</h4>
            <p class="price">₹4,800</p>
            <button class="buy-btn" onclick="openProduct(1003, 'Banarasi Silk Saree', 4800, 'Rich hand-woven silk saree with intricate golden zari work and floral borders.', 'https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcQiii67uZ4CZQoZzFhgezIbvDKVpVnTgnzcMp43r5gfe_ZXgwkkTBqvnCFXnC_I')">Buy Now</button>
        </div>

        <div class="p-card">
            <img src="https://encrypted-tbn2.gstatic.com/images?q=tbn:ANd9GcRnm-jl8FsRSaBcQ8N4PaMB2ndOSb4LtIoX94UoLV9AIdzmdCxzBRK0gV78KEFO" alt="Kalamkari Saree">
            <h4>Hand-painted Kalamkari</h4>
            <p class="price">₹3,500</p>
            <button class="buy-btn" onclick="openProduct(1004, 'Hand-painted Kalamkari', 3500, 'Authentic pen-work art on cotton-silk fabric using natural organic dyes.', 'https://encrypted-tbn2.gstatic.com/images?q=tbn:ANd9GcRnm-jl8FsRSaBcQ8N4PaMB2ndOSb4LtIoX94UoLV9AIdzmdCxzBRK0gV78KEFO')">Buy Now</button>
        </div>

        <div class="p-card">
            <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcRRjqhPK9rRjCWJNx7SNlD9NE4dvb9UhmGTPoWE2K8aSG94s4HArFd-wxgIDPzk" alt="Bandhani Dupatta">
            <h4>Bandhani Tie-Dye Dupatta</h4>
            <p class="price">₹850</p>
            <button class="buy-btn" onclick="openProduct(1005, 'Bandhani Tie-Dye Dupatta', 850, 'Traditional Rajasthani tie-and-dye work on soft georgette fabric.', 'https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcRRjqhPK9rRjCWJNx7SNlD9NE4dvb9UhmGTPoWE2K8aSG94s4HArFd-wxgIDPzk')">Buy Now</button>
        </div>

        <div class="p-card">
            <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcRejGvz6sbCUWOjg7BauYJ9TVeq1woZyULlzfkckTNqVBOz_u8ApS8qt-QAp7sp" alt="Ikat Suit">
            <h4>Handloom Ikat Suit Set</h4>
            <p class="price">₹2,100</p>
            <button class="buy-btn" onclick="openProduct(1006, 'Handloom Ikat Suit Set', 2100, 'Authentic Pochampally Ikat hand-woven cotton unstitched suit material.', 'https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcRejGvz6sbCUWOjg7BauYJ9TVeq1woZyULlzfkckTNqVBOz_u8ApS8qt-QAp7sp')">Buy Now</button>
        </div>
                <!-- Add more product cards as needed -->
            </div>
        </div>
    </div>

     <div id="cartSidebar" class="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <h3 style="margin:0;">Your Shopping Cart</h3>
            <span onclick="toggleCart()" style="font-size:30px; cursor:pointer;">&times;</span>
        </div>
        <hr>
        <div id="cartList" style="padding:10px; overflow-y:auto; height:70vh;"></div>
        <div style="padding:20px; border-top:1px solid #ddd; background:white;">
            <h4>Total: ₹<span id="totalPrice">0</span></h4>
            <button onclick="window.location.href='paymentPage.html'" class="orange-btn" style="width:100%; border-radius:5px; padding:12px; color:white; border:none; cursor:pointer; margin-top: 10px; background-color: #4D3328;">Proceed to Checkout</button>
        </div>
    </div>
    
</body>
</html>
