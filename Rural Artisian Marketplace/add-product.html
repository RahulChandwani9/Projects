<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuralConnect - Add Product</title>
  <link rel="stylesheet" href="add-product.css">
</head>
<body>
  <div class="container">
    <!-- Add Product Card -->
    <div class="add-product-card">
      <h2 class="card-title">Add Product</h2>

      <!-- Media Upload Section -->
      <div class="media-section">
        <div class="upload-boxes">
          <!-- Photo Upload -->
          <div class="upload-box" id="photoUploadBox">
            <input type="file" id="photoInput" accept="image/*" multiple hidden>
            <div class="upload-content" onclick="document.getElementById('photoInput').click()">
              <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              <span class="upload-text">Click Photo</span>
              <span class="upload-subtext">(Max 3)</span>
            </div>
          </div>

          <!-- Video Upload -->
          <div class="upload-box" id="videoUploadBox">
            <input type="file" id="videoInput" accept="video/*" hidden>
            <div class="upload-content" onclick="document.getElementById('videoInput').click()">
              <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
              </svg>
              <span class="upload-text">Record Video</span>
              <span class="upload-subtext">(Optional)</span>
            </div>
          </div>
        </div>

        <!-- Show Photo/Video Button -->
        <button class="show-media-btn" id="showMediaBtn">Show Photo/Video</button>
      </div>

      <!-- Media Preview Modal -->
      <div class="media-preview-modal" id="mediaPreviewModal">
        <div class="modal-content">
          <button class="close-modal" id="closeModal">&times;</button>
          <h3>Uploaded Media</h3>
          <div class="preview-grid" id="previewGrid">
            <p class="no-media">No media uploaded yet</p>
          </div>
        </div>
      </div>

      <!-- Product Name Input -->
      <div class="input-group">
        <div class="label-row">
          <label for="productName">Enter Product name</label>
          <button class="speaker-btn" onclick="speakText('Enter Product name')" title="Listen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </button>
        </div>
        <div class="input-row">
          <input type="text" id="productName" placeholder="Type or speak product name...">
          <button class="mic-btn" id="micBtn" title="Voice input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Product Price Input -->
      <div class="input-group">
        <div class="label-row">
          <label for="productPrice">Enter Product price</label>
          <button class="speaker-btn" onclick="speakText('Enter Product price')" title="Listen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
          </button>
        </div>
        <div class="input-row">
          <input type="text" id="productPrice" placeholder="Click to enter price..." readonly onclick="openCalculator()">
          <button class="calc-btn" onclick="openCalculator()" title="Open calculator">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="2" width="16" height="20" rx="2"></rect>
              <line x1="8" y1="6" x2="16" y2="6"></line>
              <line x1="8" y1="10" x2="8" y2="10"></line>
              <line x1="12" y1="10" x2="12" y2="10"></line>
              <line x1="16" y1="10" x2="16" y2="10"></line>
              <line x1="8" y1="14" x2="8" y2="14"></line>
              <line x1="12" y1="14" x2="12" y2="14"></line>
              <line x1="16" y1="14" x2="16" y2="14"></line>
              <line x1="8" y1="18" x2="8" y2="18"></line>
              <line x1="12" y1="18" x2="12" y2="18"></line>
              <line x1="16" y1="18" x2="16" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Calculator Modal -->
      <div class="calculator-modal" id="calculatorModal">
        <div class="calculator">
          <div class="calc-display" id="calcDisplay">0</div>
          <div class="calc-buttons">
            <button class="calc-key" onclick="appendCalc('7')">7</button>
            <button class="calc-key" onclick="appendCalc('8')">8</button>
            <button class="calc-key" onclick="appendCalc('9')">9</button>
            <button class="calc-key calc-clear" onclick="clearCalc()">C</button>
            <button class="calc-key" onclick="appendCalc('4')">4</button>
            <button class="calc-key" onclick="appendCalc('5')">5</button>
            <button class="calc-key" onclick="appendCalc('6')">6</button>
            <button class="calc-key calc-backspace" onclick="backspaceCalc()">&larr;</button>
            <button class="calc-key" onclick="appendCalc('1')">1</button>
            <button class="calc-key" onclick="appendCalc('2')">2</button>
            <button class="calc-key" onclick="appendCalc('3')">3</button>
            <button class="calc-key calc-done" onclick="confirmPrice()">Done</button>
            <button class="calc-key calc-zero" onclick="appendCalc('0')">0</button>
            <button class="calc-key" onclick="appendCalc('.')">.</button>
          </div>
        </div>
      </div>

      <!-- Category Selection -->
      <div class="category-section">
        <h3 class="section-title">Select Category</h3>
        <div class="category-grid" id="categoryGrid">
          <!-- Categories will be populated by JS -->
        </div>
      </div>

      <!-- Publish Button -->
      <button class="publish-btn" id="publishBtn">Publish Product</button>
    </div>

    <!-- Published Products Section -->
    <div class="products-section" id="productsSection">
      <h2 class="section-heading">Published Products</h2>
      <div class="products-grid" id="productsGrid">
        <!-- Products will be populated by JS -->
      </div>
    </div>
  </div>

  <script src="add-product.js"></script>
</body>
</html>
